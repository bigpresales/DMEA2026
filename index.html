<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krankenhaus Self Check-In mit Smooth Print</title>
    <style>
        body {
            background: url('Health.jpg') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            width: 100%;
            max-width: 600px;
        }
        .logo {
            max-width: 600px;
            margin-bottom: 20px;
        }
        input {
            display: block;
            width: 90%;
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #1965E1;
            color: white;
            cursor: pointer;
            margin: 5px;
        }
        #printLink {
            display: none;
            margin-top: 10px;
        }
        #statusMessage {
            margin-top: 12px;
            font-weight: 600;
            min-height: 24px;
        }
        .status-ok {
            color: #0b7a22;
        }
        .status-warn {
            color: #8a6d00;
        }
        .status-error {
            color: #b00020;
        }
        #loadingWrap {
            display: none;
            margin-top: 10px;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        #loadingWrap.is-visible {
            display: flex;
        }
        #previewPanel {
            display: none;
            margin-top: 10px;
            text-align: left;
        }
        #previewPanel.is-visible {
            display: block;
        }
        .preview-label {
            display: block;
            margin: 8px 0 4px;
            font-size: 12px;
            font-weight: 600;
            color: #1f3a70;
        }
        .preview-url {
            width: 100%;
            box-sizing: border-box;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 12px;
            min-height: 72px;
            resize: vertical;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .spinner {
            width: 18px;
            height: 18px;
            border: 3px solid #c9d8f6;
            border-top-color: #1965E1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .loading-text {
            color: #1f3a70;
            font-weight: 600;
            font-size: 14px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.0/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>
    <div class="container">
        <img src="Bluebar.jpg" alt="Logo" class="logo">
        <h1>Brother Solutions</h1>
        <h2>Krankenhaus Self Check-In mit Smooth Print</h2>
        <input type="text" id="name" placeholder="Name" required>
        <input type="text" id="lastname" placeholder="Nachname" required>
        <input type="text" id="company" placeholder="Firma" required>
        <input type="email" id="email" placeholder="E-Mail" required>
        <input type="text" id="height" placeholder="Größe (cm)" required>
        <button id="previewButton" onclick="previewLink()">Preview Link</button>
        <button id="sendButton" onclick="sendToPrint()">Send to Print</button>
        <div id="previewPanel">
            <label class="preview-label" for="previewUrlHttp">HTTP schema</label>
            <textarea id="previewUrlHttp" class="preview-url" readonly></textarea>
            <label class="preview-label" for="previewUrlBrother">brotherwebprint schema</label>
            <textarea id="previewUrlBrother" class="preview-url" readonly></textarea>
        </div>
        <div id="loadingWrap" aria-live="polite" aria-busy="false">
            <span class="spinner" aria-hidden="true"></span>
            <span class="loading-text">Printing in progress...</span>
        </div>
        <div id="statusMessage"></div>
        <a id="printLink" href="#" target="_blank">Open Smooth Print</a>
    </div>

    <script>
        function setLoading(isLoading) {
            const sendButton = document.getElementById('sendButton');
            const previewButton = document.getElementById('previewButton');
            const loadingWrap = document.getElementById('loadingWrap');
            const inputIds = ['name', 'lastname', 'company', 'email', 'height'];

            for (const id of inputIds) {
                const input = document.getElementById(id);
                input.disabled = isLoading;
            }

            sendButton.disabled = isLoading;
            sendButton.style.opacity = isLoading ? '0.6' : '1';
            sendButton.style.cursor = isLoading ? 'not-allowed' : 'pointer';

            previewButton.disabled = isLoading;
            previewButton.style.opacity = isLoading ? '0.6' : '1';
            previewButton.style.cursor = isLoading ? 'not-allowed' : 'pointer';

            if (isLoading) {
                loadingWrap.classList.add('is-visible');
                loadingWrap.setAttribute('aria-busy', 'true');
                return;
            }

            loadingWrap.classList.remove('is-visible');
            loadingWrap.setAttribute('aria-busy', 'false');
        }

        function setStatus(message, type) {
            const statusMessage = document.getElementById('statusMessage');
            statusMessage.textContent = message;
            if (type === 'error') {
                statusMessage.className = 'status-error';
                return;
            }
            if (type === 'warn') {
                statusMessage.className = 'status-warn';
                return;
            }
            statusMessage.className = 'status-ok';
        }

        function parsePrintResult(xmlText) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, 'application/xml');
            const resultNode = xmlDoc.getElementsByTagName('result')[0];
            return resultNode ? resultNode.textContent : '';
        }

        function sendByHiddenIframe(url) {
            let iframe = document.getElementById('printTransportFrame');
            if (!iframe) {
                iframe = document.createElement('iframe');
                iframe.id = 'printTransportFrame';
                iframe.name = 'printTransportFrame';
                iframe.style.display = 'none';
                document.body.appendChild(iframe);
            }

            iframe.src = `${url}${url.includes('?') ? '&' : '?'}_t=${Date.now()}`;
        }

        function setPrintLink(url, isVisible) {
            const printLink = document.getElementById('printLink');
            printLink.href = url || '#';
            printLink.style.display = isVisible ? 'block' : 'none';
        }

        function setPreviewUrls(httpUrl, brotherUrl, isVisible) {
            const previewPanel = document.getElementById('previewPanel');
            const previewUrlHttp = document.getElementById('previewUrlHttp');
            const previewUrlBrother = document.getElementById('previewUrlBrother');
            previewUrlHttp.value = httpUrl || '';
            previewUrlBrother.value = brotherUrl || '';
            if (isVisible) {
                previewPanel.classList.add('is-visible');
                return;
            }
            previewPanel.classList.remove('is-visible');
        }

        function resetFormState() {
            document.getElementById('name').value = '';
            document.getElementById('lastname').value = '';
            document.getElementById('company').value = '';
            document.getElementById('email').value = '';
            document.getElementById('height').value = '';

            const printLink = document.getElementById('printLink');
            printLink.href = '#';
            printLink.style.display = 'none';
            setPreviewUrls('', '', false);

            setStatus('', 'ok');
        }

        function previewLink() {
            const previewPanel = document.getElementById('previewPanel');
            if (previewPanel.classList.contains('is-visible')) {
                setPreviewUrls('', '', false);
                setStatus('Preview URLs are hidden.', 'ok');
                return;
            }

            const name = document.getElementById('name').value;
            const lastname = document.getElementById('lastname').value;
            const company = document.getElementById('company').value;
            const email = document.getElementById('email').value;
            const height = document.getElementById('height').value;

            const barcode_qr = `${name};${lastname};${company};${email};${height}`;
            const brotherUrl = `brotherwebprint://print?filename=patient_PJ8.lbx&size=A4&feedMode=FixedPage&text_name=${name}&text_lastname=${lastname}&text_company=${company}&text_email=${email}&text_height=${height}&barcode_qr=${barcode_qr}`;
            const httpUrl = `http://localhost:8088/print?filename=patient_PJ8.lbx&size=A4&feedMode=FixedPage&text_name=${name}&text_lastname=${lastname}&text_company=${company}&text_email=${email}&text_height=${height}&barcode_qr=${barcode_qr}`;

            setPreviewUrls(httpUrl, brotherUrl, true);
            setStatus('Preview URLs are ready.', 'ok');
        }

        function sendToPrint() {
            const name = document.getElementById('name').value;
            const lastname = document.getElementById('lastname').value;
            const company = document.getElementById('company').value;
            const email = document.getElementById('email').value;
            const height = document.getElementById('height').value;

            setLoading(true);
            setStatus('Printing request is being sent...', 'warn');

            const barcode_qr = `${name};${lastname};${company};${email};${height}`;
            //const url = `brotherwebprint://print?filename=patient_PJ8.lbx&size=A4&feedMode=FixedPage&text_name=${name}&text_lastname=${lastname}&text_company=${company}&text_email=${email}&text_height=${height}&barcode_qr=${barcode_qr}`;
            const url = `http://localhost:8088/print?filename=patient_PJ8.lbx&size=A4&feedMode=FixedPage&text_name=${name}&text_lastname=${lastname}&text_company=${company}&text_email=${email}&text_height=${height}&barcode_qr=${barcode_qr}`;
            		
			
            // Debugging: Log the URL to the console
            console.log(`Generated URL: ${url}`);

            // Hide diagnostics link during normal processing.
            setPrintLink(url, false);

            const xhr = new XMLHttpRequest();
            xhr.open('GET', url, true);
            xhr.timeout = 30000;

            xhr.onload = function () {
                const result = parsePrintResult(xhr.responseText || '');
                setLoading(false);
                if (xhr.status >= 200 && xhr.status < 300 && result === 'SUCCESS') {
                    setPrintLink(url, false);
                    setStatus('Print request sent successfully.', 'ok');
                    setTimeout(() => {
                        resetFormState();
                    }, 2000);
                    return;
                }

                if (xhr.status === 0) {
                    // Typical when CORS blocks response access from file:// origin.
                    setPrintLink(url, true);
                    setStatus('Request was likely sent, but response could not be read due to browser security policy.', 'warn');
                    return;
                }

                setPrintLink(url, true);
                setStatus(`Print request failed. HTTP ${xhr.status}, Response: ${result || 'UNKNOWN'}`, 'error');
            };

            xhr.onerror = function () {
                setLoading(false);
                setPrintLink(url, true);
                setStatus('Network/CORS error while reading response. The request may still have been received.', 'warn');
            };

            xhr.ontimeout = function () {
                setLoading(false);
                setPrintLink(url, true);
                setStatus('Ajax timed out. To avoid duplicate prints, automatic retry is skipped.', 'warn');
            };

            try {
                xhr.send();
            } catch (error) {
                setLoading(false);
                sendByHiddenIframe(url);
                setPrintLink(url, true);
                setStatus('Browser blocked Ajax send. Fallback iframe was used without page navigation.', 'warn');
                console.warn('XHR send failed, iframe fallback used:', error);
            }
        }
    </script>
</body>
</html>
